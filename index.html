<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山と森の記録</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #2e4d2c;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      background: url('images/hero.jpg') center/cover;
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      background: #4caf50;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
    }

    section {
      padding: 50px 20px;
      max-width: 900px;
      margin: auto;
    }

    .topics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .gallery img {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <div>山と森の記録</div>
    <nav>
      <a href="#">Home</a>
      <a href="#about">About</a>
      <a href="#topics">Topics</a>
    </nav>
  </header>

  <!-- ヒーロー -->
  <section class="hero">
    <h1>自然の中で学び、遊び、暮らす</h1>
    <p>登山、スキー、キャンプ、狩猟、林業の記録サイト</p>
    <a href="#topics" class="btn">活動を見る</a>
  </section>

  <!-- About -->
  <section id="about">
    <h2>このサイトについて</h2>
    <p>
      このサイトでは、自然の中での活動や体験を少しずつ記録していきます。
      登山、スキー、キャンプ、狩猟、林業など、実際に体験したことを中心にまとめていく予定です。
    </p>
  </section>

  <!-- Topics -->
  <section id="topics">
    <h2>テーマ</h2>
    <div class="topics">
      <div class="card">登山<br>山歩きの記録</div>
      <div class="card">スキー<br>雪山の活動</div>
      <div class="card">キャンプ<br>自然の中での生活</div>
      <div class="card">狩猟<br>自然との関わり</div>
      <div class="card">林業<br>森と木の仕事</div>
    </div>
  </section>

  <!-- Updates -->
  <section>
    <h2>更新情報</h2>
    <ul>
      <li>2026.04 サイト公開</li>
      <li>今後、登山・キャンプ記事を追加予定</li>
    </ul>
  </section>

  <!-- Gallery -->
  <section class="gallery">
    <h2>写真</h2>
    <img src="images/mountain.jpg" alt="山">
    <img src="images/camp.jpg" alt="キャンプ">
  </section>

  <!-- フッター -->
  <footer>
    <p>© 2026 山と森の記録</p>
  </footer>

</body>
</html>
